version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: guardllm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-guardllm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-guardllm_secret_2024}
      POSTGRES_DB: ${DB_NAME:-guardllm}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-guardllm} -d ${DB_NAME:-guardllm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guardllm-network

  # GuardLLM 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardllm-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 数据库配置
      DATABASE_URL: postgres://${DB_USER:-guardllm}:${DB_PASSWORD:-guardllm_secret_2024}@postgres:5432/${DB_NAME:-guardllm}
      # 应用端口
      PORT: 5000
      NODE_ENV: production
      # LLM API 配置（运行时设置）
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-}
      # 安全密钥
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-guardllm-encryption-key-change-in-production}
    ports:
      - "${APP_PORT:-5000}:5000"
    networks:
      - guardllm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  guardllm-network:
    driver: bridge
