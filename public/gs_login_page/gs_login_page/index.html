<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>国舜大模型安全护栏检测平台 - 登录</title>
  <style>
    :root {
      --gs-blue: #075fd5;
      --gs-blue-2: #0b7af3;
      --gs-blue-3: #eaf4ff;
      --text-main: #10284d;
      --text-sub: #60728f;
      --line: #d8e3f2;
      --card-shadow: 0 28px 70px rgba(25, 76, 143, 0.15);
      --font-sans: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: var(--font-sans);
      color: var(--text-main);
      overflow: hidden;
    }

    body {
      min-width: 1280px;
      min-height: 720px;
      background:
        radial-gradient(circle at 7% 5%, rgba(255, 255, 255, 0.9) 0 10%, transparent 28%),
        radial-gradient(circle at 28% 10%, rgba(255, 255, 255, 0.85) 0 9%, transparent 27%),
        linear-gradient(116deg, #f9fcff 0%, #eef6ff 46%, #eaf3ff 100%);
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 1280px;
      min-height: 720px;
      overflow: hidden;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0 46%, rgba(255,255,255,0.46) 46.1% 47.3%, transparent 47.4%),
        radial-gradient(circle at 84% 10%, rgba(56, 139, 255, 0.16), transparent 28%),
        radial-gradient(circle at 42% 82%, rgba(0, 113, 232, 0.12), transparent 27%);
      pointer-events: none;
    }

    .page::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 18px;
      width: 255px;
      height: 190px;
      opacity: 0.45;
      background-image: radial-gradient(rgba(76, 146, 233, 0.45) 1.4px, transparent 1.4px);
      background-size: 16px 16px;
      pointer-events: none;
    }

    .bg-arc {
      position: absolute;
      left: 49.2%;
      top: -17%;
      width: 520px;
      height: 128%;
      border-left: 20px solid rgba(32, 119, 232, 0.08);
      border-radius: 100% 0 0 100%;
      transform: rotate(3deg);
      pointer-events: none;
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(700px, 1fr) 650px;
      gap: 18px;
      width: 100%;
      height: 100%;
      padding: 64px 88px 48px 64px;
    }

    .left {
      position: relative;
      min-width: 0;
      height: 100%;
    }

    .brand-logo {
      width: 236px;
      height: auto;
      display: block;
      filter: drop-shadow(0 8px 16px rgba(0, 84, 192, 0.08));
    }

    .hero-title {
      margin: 52px 0 0;
      font-size: clamp(42px, 3.35vw, 62px);
      line-height: 1.14;
      letter-spacing: 1px;
      font-weight: 800;
      color: #102b55;
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
      white-space: nowrap;
    }

    .hero-subtitle {
      margin: 18px 0 0;
      font-size: clamp(18px, 1.25vw, 24px);
      line-height: 1.7;
      letter-spacing: 1px;
      color: var(--text-sub);
      font-weight: 500;
      white-space: nowrap;
    }

    .hero-subtitle span {
      color: #0a64d6;
      font-weight: 600;
    }

    .hero-visual-wrap {
      position: absolute;
      left: -26px;
      bottom: 82px;
      width: min(920px, 94%);
      height: auto;
      pointer-events: none;
    }

    .hero-visual-wrap::before {
      content: "";
      position: absolute;
      left: 52px;
      right: 40px;
      bottom: 30px;
      height: 95px;
      background: radial-gradient(ellipse at center, rgba(0, 98, 224, 0.18), transparent 68%);
      filter: blur(8px);
      z-index: 0;
    }

    .hero-visual {
      position: relative;
      z-index: 1;
      width: 100%;
      display: block;
      mix-blend-mode: multiply;
      opacity: 0.97;
    }

    .footer {
      position: absolute;
      left: 0;
      bottom: 12px;
      display: flex;
      align-items: center;
      gap: 20px;
      color: #74849a;
      font-size: 14px;
      white-space: nowrap;
    }

    .footer .sep {
      width: 1px;
      height: 16px;
      background: #b8c6d8;
    }

    .police-dot {
      display: inline-block;
      width: 15px;
      height: 15px;
      margin-right: 4px;
      border-radius: 50%;
      vertical-align: -2px;
      background: radial-gradient(circle at 55% 42%, #f8d24b 0 28%, #db1f24 31% 55%, #0e66c8 58% 100%);
      box-shadow: 0 1px 2px rgba(0,0,0,0.12);
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
    }

    .login-card {
      position: relative;
      width: 600px;
      max-width: 100%;
      min-height: 790px;
      padding: 44px 52px 34px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 28px;
      background: rgba(255,255,255,0.92);
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(16px);
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 50% 0%, rgba(26, 113, 255, 0.08), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,0.66), transparent 42%);
      pointer-events: none;
    }

    .login-inner {
      position: relative;
      z-index: 1;
    }

    .card-logo {
      width: 234px;
      display: block;
      margin: 0 auto 24px;
      filter: drop-shadow(0 8px 16px rgba(7, 95, 213, 0.08));
    }

    .welcome {
      margin: 0;
      text-align: center;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #1b3359;
    }

    .blue-line {
      width: 47px;
      height: 4px;
      margin: 18px auto 32px;
      border-radius: 999px;
      background: linear-gradient(90deg, #0a5fda, #0888ff);
    }

    .form {
      width: 100%;
    }

    .field {
      position: relative;
      display: flex;
      align-items: center;
      height: 58px;
      margin-bottom: 18px;
      border: 1px solid #d5dfec;
      border-radius: 10px;
      background: rgba(255,255,255,0.82);
      transition: 0.2s ease;
    }

    .field:hover {
      border-color: #b7cbeb;
      box-shadow: 0 8px 22px rgba(15, 96, 210, 0.06);
    }

    .field svg {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      margin-left: 20px;
      color: #9aa9bd;
    }

    .field input {
      width: 100%;
      height: 100%;
      min-width: 0;
      padding: 0 16px;
      border: 0;
      outline: none;
      background: transparent;
      color: #243a5c;
      font-size: 16px;
      font-family: inherit;
    }

    .field input::placeholder {
      color: #aab5c5;
    }

    .eye {
      margin-right: 18px;
      color: #9aa9bd;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: 1fr 142px 34px;
      gap: 14px;
      align-items: center;
      margin-bottom: 20px;
    }

    .captcha-row .field { margin-bottom: 0; }

    .captcha {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 58px;
      border: 1px solid #d4e3fa;
      border-radius: 10px;
      overflow: hidden;
      color: #0c63d8;
      font-family: "Courier New", monospace;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 10px;
      background:
        linear-gradient(135deg, rgba(242,247,255,0.85), rgba(255,255,255,0.9)),
        repeating-linear-gradient(22deg, transparent 0 8px, rgba(0,92,204,0.11) 9px 10px);
    }

    .captcha::before,
    .captcha::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .captcha::before {
      background-image: radial-gradient(rgba(20, 100, 220, 0.22) 1px, transparent 1px);
      background-size: 9px 9px;
      opacity: 0.75;
    }

    .captcha::after {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 90, 220, 0.32), transparent);
      top: 31px;
      transform: rotate(-6deg);
    }

    .refresh {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 58px;
      color: #72839c;
      cursor: default;
    }

    .options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 4px 0 26px;
      font-size: 15px;
      color: #3d5271;
    }

    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .checkbox-box {
      position: relative;
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: #0b74ef;
      box-shadow: 0 3px 8px rgba(7, 95, 213, 0.25);
    }

    .checkbox-box::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .forgot {
      color: #0875ea;
      text-decoration: none;
      font-weight: 500;
    }

    .login-btn {
      width: 100%;
      height: 62px;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 22px;
      letter-spacing: 12px;
      text-indent: 12px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(90deg, #0869df, #006de8 50%, #0577f3);
      box-shadow: 0 13px 26px rgba(0, 106, 229, 0.22);
      cursor: default;
    }

    .other-title {
      position: relative;
      margin: 30px 0 18px;
      text-align: center;
      color: #9caabd;
      font-size: 14px;
    }

    .other-title::before,
    .other-title::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 39%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e1e8f3);
    }

    .other-title::before { left: 0; }
    .other-title::after {
      right: 0;
      transform: rotate(180deg);
    }

    .sms-login {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #8796aa;
      font-size: 13px;
    }

    .sms-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid #d9e7f8;
      border-radius: 50%;
      color: #0b72e9;
      background: #fff;
    }

    .card-bottom {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      align-items: center;
      gap: 22px;
      margin-top: 28px;
      padding-top: 26px;
      border-top: 1px solid #e7edf5;
      color: #0b72e9;
      font-size: 16px;
      font-weight: 600;
    }

    .card-bottom .vline {
      width: 1px;
      height: 24px;
      background: #dbe4ef;
    }

    .bottom-link {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #0b72e9;
    }

    .bottom-link svg,
    .sms-icon svg,
    .refresh svg,
    .eye svg {
      width: 21px;
      height: 21px;
      stroke: currentColor;
    }

    @media (max-width: 1400px) {
      .layout { padding-left: 52px; padding-right: 52px; grid-template-columns: minmax(640px, 1fr) 560px; }
      .login-card { width: 540px; min-height: 740px; padding: 38px 44px 30px; }
      .hero-title { font-size: 46px; }
      .hero-visual-wrap { width: 840px; bottom: 78px; }
      .brand-logo { width: 210px; }
      .card-logo { width: 210px; }
      .welcome { font-size: 23px; }
    }

    @media (max-height: 820px) {
      .layout { padding-top: 38px; padding-bottom: 32px; }
      .hero-title { margin-top: 34px; }
      .hero-visual-wrap { bottom: 52px; width: 780px; }
      .login-card { min-height: auto; padding-top: 34px; padding-bottom: 28px; }
      .field, .captcha, .refresh { height: 52px; }
      .login-btn { height: 56px; }
      .card-bottom { margin-top: 18px; padding-top: 20px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="bg-arc"></div>

    <section class="layout" aria-label="国舜大模型安全护栏检测平台登录页">
      <div class="left">
        <img class="brand-logo" src="assets/logo.png" alt="GS 国舜" />

        <h1 class="hero-title">国舜大模型安全护栏检测平台</h1>
        <p class="hero-subtitle">智能守护大模型安全 · 全面检测风险隐患 · 构建可信 <span>AI</span> 生态</p>

        <div class="hero-visual-wrap">
          <img class="hero-visual" src="assets/hero-illustration.png" alt="AI安全护栏检测平台视觉图" />
        </div>

        <footer class="footer">
          <span>© 2024 国舜集团 版权所有</span>
          <span class="sep"></span>
          <span>浙ICP备12034567号-1</span>
          <span class="sep"></span>
          <span><i class="police-dot"></i>浙公网安备 33010502001234号</span>
        </footer>
      </div>

      <div class="right">
        <section class="login-card" aria-label="登录框">
          <div class="login-inner">
            <img class="card-logo" src="assets/logo.png" alt="GS 国舜" />
            <h2 class="welcome">欢迎登录国舜大模型安全护栏检测平台</h2>
            <div class="blue-line"></div>

            <form class="form">
              <label class="field">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" placeholder="请输入用户名" />
              </label>

              <label class="field">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
                <input type="password" placeholder="请输入密码" />
                <span class="eye" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"/><path d="M9.9 4.2A10.4 10.4 0 0 1 12 4c5.5 0 9 5 9 8a8.6 8.6 0 0 1-2.1 3.9"/><path d="M6.1 6.1C4.2 7.5 3 9.7 3 12c0 3 3.5 8 9 8 1.6 0 3-.4 4.2-1"/></svg></span>
              </label>

              <div class="captcha-row">
                <label class="field">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
                  <input type="text" placeholder="请输入验证码" />
                </label>
                <div class="captcha" aria-label="验证码">7K38</div>
                <span class="refresh" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-15 6.7"/><path d="M3 12A9 9 0 0 1 18 5.3"/><path d="M18 2v4h-4"/><path d="M6 22v-4h4"/></svg></span>
              </div>

              <div class="options">
                <span class="checkbox"><span class="checkbox-box"></span>记住用户名</span>
                <a class="forgot" href="javascript:void(0)">忘记密码?</a>
              </div>

              <button class="login-btn" type="button">登录</button>
            </form>

            <div class="other-title">其他登录方式</div>
            <div class="sms-login">
              <span class="sms-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg></span>
              <span>短信验证码登录</span>
            </div>

            <div class="card-bottom">
              <a class="bottom-link" href="javascript:void(0)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14v-2a8 8 0 0 1 16 0v2"/><path d="M4 14a2 2 0 0 0 2 2h1v-5H6a2 2 0 0 0-2 2v1Z"/><path d="M20 14a2 2 0 0 1-2 2h-1v-5h1a2 2 0 0 1 2 2v1Z"/><path d="M16 19c-.6 1.2-1.9 2-4 2"/></svg>
                联系客服
              </a>
              <span class="vline"></span>
              <a class="bottom-link" href="javascript:void(0)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.8 1c0 2-2.3 2.2-2.3 4"/><path d="M12 17h.01"/></svg>
                帮助中心
              </a>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
